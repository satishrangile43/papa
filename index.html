<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Elite | Digital Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #b8860b;
            --black: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(184, 134, 11, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.1) 0%, transparent 40%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            perspective: 1000px;
        }

        /* Powerful Entrance Animation */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,215,0,0.05);
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* Glowing Logo Section */
        .logo-container {
            position: relative;
            margin-bottom: 25px;
        }

        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--gold), #fff, var(--dark-gold));
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            margin: 0 auto;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Dashing Typography */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--gold);
            margin-bottom: 35px;
            font-weight: 700;
            opacity: 0.8;
        }

        /* Power Buttons */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-link {
            position: relative;
            text-decoration: none;
            color: #fff;
            padding: 18px 25px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 215, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .btn-link::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-link:hover::before { left: 100%; }

        .btn-link:hover {
            transform: scale(1.03) translateY(-2px);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(255, 215, 0, 0.1);
            background: rgba(255, 215, 0, 0.05);
        }

        .btn-link i {
            font-size: 20px;
            color: var(--gold);
        }

        /* Bottom Floating Action Bar */
        .bottom-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .action-circle {
            flex: 1;
            padding: 15px;
            background: var(--gold);
            color: #000;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .action-circle.dark {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .action-circle:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.4;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="glass-card">
            
            <div class="logo-container">
                <div class="logo-circle">
                    <img src="logo.png" alt="Fortune Logo">
                </div>
            </div>

            <h1>FORTUNE</h1>
            <div class="subtitle">Event Planner</div>

            <div class="links-stack">
                <a href="https://www.instagram.com/fortuneeventplanner1/" target="_blank" class="btn-link">
                    <span><i class="fab fa-instagram"></i> &nbsp; Instagram</span>
                    <i class="fas fa-external-link-alt" style="font-size: 12px; opacity: 0.5;"></i>
                </a>

                <a href="https://www.facebook.com/share/1AnnWB7bon/" target="_blank" class="btn-link">
                    <span><i class="fab fa-facebook-f"></i> &nbsp; Facebook</span>
                    <i class="fas fa-external-link-alt" style="font-size: 12px; opacity: 0.5;"></i>
                </a>

                <a href="https://drive.google.com/file/d/1Lhq-ZemRw45XnyoyJay7iPdPCKOvzdlw/view?usp=drivesdk" target="_blank" class="btn-link">
                    <span><i class="fas fa-crown"></i> &nbsp; Premium Brochure</span>
                    <i class="fas fa-chevron-right" style="font-size: 12px; opacity: 0.5;"></i>
                </a>

                <a href="https://wa.me/19174564996" target="_blank" class="btn-link">
                    <span><i class="fab fa-whatsapp"></i> &nbsp; Contact WhatsApp</span>
                    <i class="fas fa-comment-dots" style="font-size: 12px; opacity: 0.5;"></i>
                </a>
            </div>

            <div class="bottom-actions">
                <a href="tel:+19174564996" class="action-circle">
                    <i class="fas fa-phone"></i> Call
                </a>
                <a href="mailto:fortuneeventplanner1@gmail.com" class="action-circle dark">
                    <i class="fas fa-envelope"></i> Email
                </a>
            </div>

            <div class="footer">
                ESTABLISHED 2024 • LUXURY EVENTS
            </div>

        </div>
    </div>

</body>
</html>
